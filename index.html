<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Learning Hub</title>
    <link rel="stylesheet" href="styles/base.css">
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo">
                <img src="imgs/image.png" alt="Logo" class="logo-icon">
                <span class="logo-text">Learning</span>
            </div>
            <nav class="nav-links">
                <a href="#paths">Cursos</a>
                <a href="#">Programas</a>
            </nav>
            <div class="nav-actions">
                <a class="ghost" href="login.html">Log in</a>
                <a class="solid" href="#paths">Empezar</a>
            </div>
        </div>
    </header>

    <main>
        <!-- SECCIÓN 1: Hero -->
        <section class="hero">
            <div class="hero-content">
                <div class="hero-grid" id="hero-grid">
                    <!-- Aquí JavaScript insertará el contenido del hero -->
                </div>
                <div class="hero-actions">
                    <a class="solid" href="#paths">Explorar rutas</a>
                </div>
            </div>
        </section>

        <!-- SECCIÓN 2: Grilla de Cursos -->
        <section id="paths" class="courses-section">
            <div class="section-header">
                <h2>Nuestros Cursos Disponibles</h2>
                <p>Selecciona un curso para ver sus módulos y lecciones.</p>
            </div>
            <div id="courses-grid" class="courses-grid">
                <!-- Aquí JavaScript insertará las tarjetas de los cursos -->
                <p class="loading-text">Cargando cursos...</p>
            </div>
        </section>


        <section id="activity-section">
            <div class="section-header">
                <h2>Actividad Reciente</h2>
                <p>Revisa progreso y actividades recientes.</p>
            </div>
            <div id="activity-feed" class="activity-feed">
                <!-- Aquí JavaScript insertará las actividades recientes -->
                <p class="loading-text">Cargando actividad...</p>
            </div>
        </section>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
