<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Campus | Acceso Administrativo</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/index.css">
</head>
<body class="login-page">
  <main class="login-wrapper">
    <section class="login-card">
      <div class="login-header">
        <img src="imgs/image.png" alt="Logo ABC Campus" class="login-logo">
        <h1>Inicio Sesion</h1>
        <p>Ingreso para administrativos y docentes</p>
      </div>

      <form id="login-form" class="login-form" novalidate>
        <label for="email">Correo institucional</label>
        <input id="email" name="email" type="email" autocomplete="email" required>

        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>

        <p id="login-error" class="inline-error" aria-live="polite"></p>

        <button type="submit" class="solid">Ingresar al panel</button>
      </form>
    </section>
  </main>

  <script src="js/data/store.js"></script>
  <script src="js/services/login.js"></script>
</body>
</html>
