<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Campus | Vista Dashboard</title>
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>
  <div class="dashboard-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <img src="imgs/image.png" alt="Logo ABC Campus" class="logo-icon">
        <span>Dashboard</span>
      </div>
      <nav class="sidebar-nav">
        <a href="admin.html" class="active">Ir al panel administrativo</a>
      </nav>
      <div class="sidebar-footer">
        <button class="btn-session" type="button">Vista base de diseño</button>
      </div>
    </aside>

    <main class="dashboard-main">
      <header class="top-bar">
        <h2>Base visual del dashboard</h2>
      </header>

      <section class="stats-grid">
        <div class="stat-card">
          <h3>Componente</h3>
          <p class="stat-number">Sidebar</p>
        </div>
        <div class="stat-card">
          <h3>Componente</h3>
          <p class="stat-number">Top bar</p>
        </div>
        <div class="stat-card">
          <h3>Componente</h3>
          <p class="stat-number">Content</p>
        </div>
      </section>

      <section class="content-section">
        <div class="section-header">
          <h3>Esta página queda como referencia del diseño</h3>
        </div>
        <article class="course-admin-card">
          <div class="course-main-info">
            <div class="course-text">
              <span class="course-code">INFO</span>
              <h4>Usa admin.html para trabajar el panel funcional</h4>
              <p>Esta vista no se elimina para mantener archivos existentes.</p>
            </div>
          </div>
        </article>
      </section>
    </main>
  </div>
</body>
</html>
